<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Countdown 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: white;
}

h1 {
  margin-top: 80px;
  font-size: 40px;
}

#countdown {
  margin-top: 50px;
  font-size: 30px;
  font-weight: bold;
  background: rgba(0,0,0,0.2);
  display: inline-block;
  padding: 20px 30px;
  border-radius: 15px;
}

.small {
  margin-top: 20px;
  font-size: 18px;
  opacity: 0.9;
}

button {
  margin-top: 30px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>🎂 Birthday Countdown 🎉</h1>

<div id="countdown">Loading...</div>
<div class="small">Get ready for a special day 💖</div>

<!-- 🎶 MUSIC -->
<audio id="bgMusic" loop>
  <!-- Replace this link with your own mp3 -->
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a5b6c7.mp3?filename=happy-birthday-to-you-piano-version-109526.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">🎶 Play Music</button>

<script>
// 🎯 SET DATE HERE
const targetDate = new Date("June 17, 2026 00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML =
      "🎉 It's Birthday Time! 🎂💖";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// 🎶 Music control
function playMusic() {
  document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
