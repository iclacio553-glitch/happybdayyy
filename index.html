<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎁</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
}

.container{
    padding:20px;
}

.gift{
    font-size:120px;
    cursor:pointer;
    transition:transform .3s;
}

.gift:hover{
    transform:scale(1.1);
}

.hidden{
    display:none;
}

.message{
    max-width:500px;
}

h1{
    font-size:40px;
}

p{
    font-size:20px;
    line-height:1.6;
}
</style>
</head>
<body>

<div class="container">

    <div id="giftBox" class="gift">
        🎁
    </div>

    <div id="surprise" class="hidden message">
        <h1>🎂 Happy Birthday! 🎉</h1>

        <p>
            Today is all about you. ❤️
            Thank you for being such an amazing person.
            I hope your day is filled with happiness,
            laughter, love, and everything you wish for.
        </p>

        <p>
            No matter how far apart we are,
            you're always close to my heart. 💖
        </p>

        <h2>🎈 Enjoy your special day! 🎈</h2>
    </div>

    <audio id="music" loop>
        <source src="freesound_community-happy-birthday-to-you-made-by-me-100631.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
const gift = document.getElementById("giftBox");
const surprise = document.getElementById("surprise");
const music = document.getElementById("music");

gift.addEventListener("click", () => {
    gift.style.display = "none";
    surprise.classList.remove("hidden");
    music.play();
});
</script>

</body>
</html>
