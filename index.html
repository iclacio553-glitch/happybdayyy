<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    color: white;
}

h1 {
    margin-top: 30px;
    font-size: 40px;
}

.message {
    font-size: 18px;
    margin-bottom: 20px;
}

.slideshow-container {
    width: 90%;
    max-width: 400px;
    margin: auto;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.slide {
    display: none;
}

.slide img {
    width: 100%;
    height: 500px;
    object-fit: cover;
}

.caption {
    background: rgba(0,0,0,0.4);
    padding: 12px;
    font-size: 18px;
}

button {
    margin-top: 20px;
    padding: 12px 24px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

.footer {
    margin: 25px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday 🎉</h1>

<div class="message">
    Wishing you happiness, love, and endless smiles today and always ❤️
</div>

<!-- 🎶 MUSIC -->
<audio id="bgMusic" loop>
    <source src="freesound_community-happy-birthday-to-you-made-by-me-100631.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('bgMusic').play()">
    🎶 Play Music
</button>

<br><br>

<!-- 📸 PHOTO SLIDESHOW -->
<div class="slideshow-container">

    <div class="slide">
        <img src="https://drive.google.com/uc?export=view&id=1vDApYQ3oT-fdxKyApmSPG-AtYKlb_hq3">
        <div class="caption">💖 Beautiful Memories</div>
    </div>

    <div class="slide">
        <img src="https://drive.google.com/uc?export=view&id=1ExD55r0LMLPyEWXW08rRqZJqP_awubzG">
        <div class="caption">💕 My Favorite Person</div>
    </div>

    <div class="slide">
        <img src="https://drive.google.com/uc?export=view&id=1j5GIW6mgpPwhJswr36P6CxR2NoCkIIzW">
        <div class="caption">🥰 So Many Happy Moments</div>
    </div>

    <div class="slide">
        <img src="https://drive.google.com/uc?export=view&id=1qikXzrVo6GzTvTzW7a2HCDWuFxS75Dbi">
        <div class="caption">🎉 Happy Birthday!</div>
    </div>

</div>

<div class="footer">
    ❤️ Made with love ❤️
</div>

<script>
let slideIndex = 0;
showSlides();

function showSlides() {
    let slides = document.getElementsByClassName("slide");

    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }

    slideIndex++;

    if (slideIndex > slides.length) {
        slideIndex = 1;
    }

    slides[slideIndex - 1].style.display = "block";

    setTimeout(showSlides, 3000);
}
</script>

</body>
</html>
